<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>A Letter for you</title>
  <link rel="stylesheet" href="Message.css">
</head>
<body>
    
  <div class="envelope">
    <div class="flap"></div>
    <div class="letter">
      <h1>Dear Nai</h1>
      <p style="color: #f8f8f8;">First and foremost Happy Anniversary My LOVE. I am not one who is good at expressing my feelings however I would like to tell you that I can't believe we have made it to our 1 year Anniversary. Looking back it feels like I have known you and have dated you for a long time and</p>
    </div>
  </div>
  <button onclick="openLetter()" id="button">Click to Open</button>
  <script>
    function openLetter() {
      document.querySelector(".envelope").classList.toggle("open");
      if(document.querySelector("#button").innerText=="CLOSE"){
        document.querySelector("button").innerText="Click to open"
      }
      else{
      document.querySelector("#button").innerHTML="CLOSE";
      }
    }
  </script>
    <button style="background-color: rgb(192, 10, 10);  "><a style="color: azure; text-decoration: none;" href="index.html"><b>Go Back</b></a> </button>
</body>
</html>
